name: Build & Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ── Build React client ──────────────────────────────────────────────────
      # Use `npm install` (not `npm ci`): the Windows-generated lock file omits
      # Linux platform binaries for Vite 8 Rolldown, making `npm ci` fail on Ubuntu.
      - name: Install client dependencies
        run: cd client && npm install --no-audit --no-fund

      - name: Build React app
        run: cd client && npm run build

      - name: Copy build to server/public
        run: |
          mkdir -p server/public
          cp -r client/dist/. server/public/

      # ── Generate Prisma Client on CI (no WASM restrictions on Ubuntu) ────────
      # cPanel CloudLinux LVE limits block WebAssembly memory allocation, so
      # `prisma generate` and `prisma db push` cannot run on cPanel.
      # Solution: generate on CI, deploy the output (server/generated/) via FTP.
      # schema.prisma output = "../generated" → server/generated/
      # binaryTargets includes both debian and rhel to cover all cPanel hosts.
      - name: Install server dependencies (with Prisma CLI for generate)
        run: cd server && npm install --no-audit --no-fund

      - name: Generate Prisma Client for Linux
        run: cd server && ./node_modules/.bin/prisma generate
        # Creates server/generated/ with:
        #   index.js — generated TypeScript/JS Prisma Client (platform-independent)
        #   libquery_engine-debian-openssl-3.0.x.so.node — ~25 MB, for Debian hosts
        #   libquery_engine-rhel-openssl-3.0.x.so.node   — ~25 MB, for RHEL/CloudLinux

      # ── Generate server/.env from GitHub Secrets ─────────────────────────────
      - name: Create server .env
        run: |
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" > server/.env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> server/.env
          echo "JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}" >> server/.env
          echo "NODE_ENV=production" >> server/.env
          echo "PORT=5000" >> server/.env
          echo "CLIENT_URL=${{ secrets.CLIENT_URL }}" >> server/.env

      # ── Passenger restart trigger ────────────────────────────────────────────
      - name: Prepare Passenger restart trigger
        run: mkdir -p server/tmp && touch server/tmp/restart.txt

      # ── FTP Deploy to cPanel ─────────────────────────────────────────────────
      # server/generated/ is NOT inside node_modules so it is included in deploy.
      # First upload (~60 MB for engine binaries) is slow; subsequent runs skip
      # unchanged files via FTP sync state.
      - name: Deploy to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            client/**
            **/deploy*.yml
            **/*.xlsm
            **/*.xlsx

      # ── SSH: install deps (no Prisma CLI), apply SQL schema, seed admin ──────
      # Key differences from previous attempts:
      #   • NO `source activate` — avoids NODE_PATH pointing to global Prisma v7
      #   • Uses absolute paths to nodevenv node/npm binaries
      #   • npm install --omit=dev — skips devDependencies (prisma CLI), no WASM
      #   • Schema applied via `node prisma/setup.js` which uses pg (pure JS)
      #   • PrismaClient loaded from server/generated/ (deployed above via FTP)
      - name: Setup database & seed admin
        uses: appleboy/ssh-action@v1.0.3
        continue-on-error: true
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script: |
            cd $HOME/costing/server

            # Locate nodevenv node/npm binaries without activating the venv.
            # Activation sets NODE_PATH to the global lib (may have stale Prisma)
            # and can override local module resolution.
            NVENV_BIN=$(ls -d $HOME/nodevenv/costing/server/*/bin 2>/dev/null | tail -1)
            NODE="$NVENV_BIN/node"
            NPM="$NVENV_BIN/npm"
            echo "Node: $($NODE --version 2>/dev/null)"
            echo "NPM:  $($NPM  --version 2>/dev/null)"

            # Install production deps only (--omit=dev skips the prisma CLI).
            # Without the prisma CLI, @prisma/client postinstall skips generate.
            # No prisma CLI = no WASM = no cPanel LVE memory error.
            "$NPM" install --omit=dev --no-audit --no-fund

            # Apply schema SQL + seed admin (uses pg module + server/generated/).
            "$NODE" prisma/setup.js

            touch tmp/restart.txt
            echo "✅ Database setup complete"
