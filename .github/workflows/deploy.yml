name: Build & Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ── Build React client ──────────────────────────────────────────────────
      # Use `npm install` (not `npm ci`): the Windows-generated lock file omits
      # Linux platform binaries (rollup/esbuild native), which makes `npm ci`
      # fail on the Ubuntu runner. `npm install` fetches the correct binaries.
      - name: Install client dependencies
        run: cd client && npm install --no-audit --no-fund

      - name: Build React app
        run: cd client && npm run build

      - name: Copy build to server/public
        run: |
          mkdir -p server/public
          cp -r client/dist/. server/public/

      # ── Generate server/.env from GitHub Secrets ─────────────────────────────
      - name: Create server .env
        run: |
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" > server/.env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> server/.env
          echo "JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}" >> server/.env
          echo "NODE_ENV=production" >> server/.env
          echo "PORT=5000" >> server/.env
          echo "CLIENT_URL=${{ secrets.CLIENT_URL }}" >> server/.env

      # ── Passenger restart trigger ────────────────────────────────────────────
      - name: Prepare Passenger restart trigger
        run: mkdir -p server/tmp && touch server/tmp/restart.txt

      # ── FTP Deploy to cPanel ─────────────────────────────────────────────────
      - name: Deploy to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            client/**
            **/deploy*.yml
            **/*.xlsm
            **/*.xlsx

      # ── SSH: install deps, migrate DB, seed admin ────────────────────────────
      # IMPORTANT: Do NOT activate the nodevenv. Activation sets NODE_PATH to the
      # nodevenv global lib (which may have a stale global Prisma version), causing
      # require() to find the wrong version even after a clean local npm install.
      # Instead, use the nodevenv node/npm binaries via absolute path only.
      - name: Setup database & seed admin
        uses: appleboy/ssh-action@v1.0.3
        continue-on-error: true
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script: |
            cd $HOME/costing/server

            # Locate the nodevenv bin dir (provides the correct Node version).
            NVENV_BIN=$(ls -d $HOME/nodevenv/costing/server/*/bin 2>/dev/null | tail -1)
            NODE="$NVENV_BIN/node"
            NPM="$NVENV_BIN/npm"
            echo "Node: $($NODE --version 2>/dev/null)"
            echo "NPM:  $($NPM  --version 2>/dev/null)"

            # Force-remove stale Prisma packages so npm installs the version
            # pinned in package-lock.json (v5) without using any cached binaries.
            rm -rf node_modules/.prisma node_modules/prisma node_modules/@prisma node_modules/.bin/prisma

            # Install locally (./node_modules). No NODE_PATH means no global interference.
            "$NPM" install --no-audit --no-fund

            # Run the one-shot setup: prisma generate + db push + seed admin.
            # Prisma v5 uses a native binary engine — no WASM, no cPanel restrictions.
            "$NODE" prisma/setup.js

            touch tmp/restart.txt
            echo "✅ Database setup complete"
