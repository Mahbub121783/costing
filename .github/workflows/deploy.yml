name: Build & Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      # ── Build React client ──────────────────────────────────────────────────
      - name: Install client dependencies
        run: cd client && npm ci

      - name: Build React app
        run: cd client && npm run build

      - name: Copy build to server/public
        run: |
          mkdir -p server/public
          cp -r client/dist/. server/public/

      # ── Generate server/.env from GitHub Secrets ─────────────────────────────
      - name: Create server .env
        run: |
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" > server/.env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> server/.env
          echo "JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}" >> server/.env
          echo "NODE_ENV=production" >> server/.env
          echo "PORT=5000" >> server/.env
          echo "CLIENT_URL=${{ secrets.CLIENT_URL }}" >> server/.env

      # ── Passenger restart trigger ────────────────────────────────────────────
      - name: Prepare Passenger restart trigger
        run: mkdir -p server/tmp && touch server/tmp/restart.txt

      # ── FTP Deploy to cPanel ─────────────────────────────────────────────────
      - name: Deploy to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            client/**
            **/deploy*.yml
            **/*.xlsm
            **/*.xlsx

      # ── SSH: install deps, migrate DB, seed admin user ───────────────────────
      - name: Setup database & seed admin
        uses: appleboy/ssh-action@v1.0.3
        continue-on-error: true
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script: |
            cd ${{ secrets.APP_PATH }}/server
            npm install --omit=dev
            npx prisma generate
            npx prisma db push --accept-data-loss
            npm run seed
            echo "Database ready"
