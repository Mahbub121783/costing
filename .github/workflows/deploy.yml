name: Build & Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      # ── Build React client ──────────────────────────────────────────────────
      - name: Install client dependencies
        run: cd client && npm ci

      - name: Build React app
        run: cd client && npm run build

      # Copy built files into server/public/ so Express can serve them
      - name: Copy build to server/public
        run: |
          mkdir -p server/public
          cp -r client/dist/. server/public/

      # ── Passenger restart trigger ────────────────────────────────────────────
      # Touching this file makes cPanel/Passenger restart the Node.js app
      - name: Prepare Passenger restart trigger
        run: mkdir -p server/tmp && touch server/tmp/restart.txt

      # ── FTP Deploy to cPanel ─────────────────────────────────────────────────
      - name: Deploy to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            client/**
            **/.env
            **/deploy*.yml
            **/*.xlsm
            **/*.xlsx
